    <header class="py-3 encabezado">
        <div class="container border">
            <div class="row align-items-center">
                <div class="col-12 col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <img src="img/logo-intecap.png" alt="Logo Intecap" width="100px">
                </div>

                    <a href="https://www.facebook.com/intecap" class="text-decoration-none text-dark me-2"><i class="bi bi-facebook fs-4"></i></a>
                    <a href="https://www.instagram.com/intecapoficial" class="text-decoration-none text-dark me-2"><i class="bi bi-instagram fs-4"></i></a>
                    <a href="https://twitter.com/intecapoficial" class="text-decoration-none text-dark"><i class="bi bi-twitter-x fs-4"></i></a>
                </div>
            </div>
        </div>
    </header>


    <nav class="navbar navbar-expand-lg ">
        <div class="container border">

            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Inicio</a>

                        <a class="nav-link" href="indemnizacion.html">Indemnizacion</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12 col-md-9 border p-3">
                <div class="row">
                    <div class="col-12 col-lg-6 border p-3 mb-3 mb-lg-0">
                        <h2>Indemnizacion</h2>
                        <form action="">
                            <label for="">Sueldo Base</label>
                            <input type="number" name="sueldoBase" id="sueldoBase" class="form-control">

                            <label for="">años trabajados</label>
                            <input type="number" name="añosTrabajados" id="añosTrabajados" class="form-control">


                            <label for="">Bono 14</label>
                            <input type="number" name="bono14" id="bono14" class="form-control" disabled
                                placeholder="No llenar nada">

                            <label for="">Aguinaldo</label>
                            <input type="number" name="aguinaldo" id="aguinaldo" class="form-control" disabled
                                placeholder="No llenar nada">

                            <label for="">Salario pendiente</label>
                            <input type="number" name="salarioPendiente" id="salarioPendiente" class="form-control">

                            <label for="">Cobros Pendientes</label>
                            <input type="number" name="cobrosPendientes" id="cobrosPendientes" class="form-control">

                            <button type="button" class="btn btn-primary mt-3" id="calcular">Calcular</button>
                        </form>
                    </div>
                    <div class="col-12 col-lg-6 p-3">
                        <h2>Resultado Indemnizacion</h2>
                        <div class="bg-warning" id="resultado">
                            <p>
                                Aqui se mostrara el resultado de la indemnizacion
                            </p>
                        </div>
                    </div>
                </div>
            </div>
