<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="py-3 encabezado">
        <div class="container border">
            <div class="row align-items-center">
                <div class="col-12 col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <img src="img/logo-intecap.png" alt="Logo Intecap" width="100px">
                </div>
                <div class="col-12 col-md-6 text-center text-md-end">
                    <a href="https://www.facebook.com/intecap" class="text-decoration-none text-dark me-2"><i class="bi bi-facebook fs-4"></i></a>
                    <a href="https://www.instagram.com/intecapoficial" class="text-decoration-none text-dark me-2"><i class="bi bi-instagram fs-4"></i></a>
                    <a href="https://twitter.com/intecapoficial" class="text-decoration-none text-dark"><i class="bi bi-twitter-x fs-4"></i></a>
                </div>
            </div>
        </div>
    </header>


    <nav class="navbar navbar-expand-lg ">
        <div class="container border">
            <button class="navbar-toggler mx-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="empleados.html">Empleados</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sueldo_liquido.html">Sueldo Liquido</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Indemnizacion.html">Indemnizacion</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-12 col-md-4 col-lg-3 border p-3 d-flex flex-column justify-content-between mb-4 mb-md-0">
                <form action="">
                    <h2>Empleado</h2>
                    <label for="">Nombre</label>
                    <input type="text" name="nombre" id="nombre" class="form-control">
                    <label for="">Fecha de ingreso</label>
                    <input type="date" name="fechaIngreso" id="fechaIngreso" class="form-control">
                    <label for="">Puesto</label>
                    <input type="text" name="puesto" id="puesto" class="form-control">
                    <label for="">salario</label>
                    <input type="number" name="salario" id="salario" class="form-control">
                    <button type="button" class="btn btn-primary form-control mt-3" id="btnGuardar">Guardar</button>
                </form>

                <div class="mt-5 text-center">
                    <img src="img/logo-intecap-53años.png" alt="Logo INTECAP" width="200px" class="img-fluid">
                </div>
            </div>
            <div class="col-12 col-md-8 col-lg-9 border p-3">
                <div class="row mb-3">
                    <div class="col-12 col-lg-6">
                        <h2>Lista de Empleados</h2>
                    </div>
                    <div class="col-12 col-lg-6 text-lg-end">
                        <button type="button" class="btn btn-primary mb-2" id="btnEliminarPrimero">Eliminar Primero</button>
                        <button type="button" class="btn btn-primary mb-2" id="btnEliminarUltimo">Eliminar Ultimo</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <div class="table-responsive">
                            <table class="table" id="tablaEmpleados">
                                <thead>
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Fecha de ingreso</th>
                                        <th>Puesto</th>
                                        <th>Salario</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>Juan</td>
                                        <td>2022-01-01</td>
                                        <td>Programador</td>
                                        <td>1000</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
